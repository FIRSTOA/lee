<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오버홀 재수리 요청</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f4f6fa;color:#222;padding:16px;}
  .wrap{max-width:680px;margin:0 auto;}
  .card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,.05);margin-bottom:16px;}
  .head{background:linear-gradient(135deg,#ff7a18,#ff9a4a);color:#fff;padding:18px 22px;}
  .head h1{margin:0;font-size:20px;display:flex;align-items:center;gap:8px;}
  .head p{margin:4px 0 0;font-size:12.5px;opacity:.92;}
  .sec{padding:18px 22px;border-top:6px solid #f4f6fa;}
  .sec:first-of-type{border-top:none;}
  .sec h2{margin:0 0 14px;font-size:14px;color:#ff7a18;display:flex;align-items:center;gap:7px;}
  .sec h2 .n{background:#ff7a18;color:#fff;width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;}
  label{display:block;font-size:12.5px;font-weight:700;color:#374151;margin:0 0 6px;}
  .req::after{content:" *";color:#ef4444;}
  input[type=text],input[type=date],select,textarea{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:9px;font-size:14px;font-family:inherit;background:#fff;}
  textarea{min-height:70px;resize:vertical;}
  .field{margin-bottom:14px;}
  .row{display:flex;gap:14px;} .row>div{flex:1;}
  .muted{font-size:11.5px;color:#6b7280;margin-top:5px;}
  .btn{border:none;border-radius:9px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;}
  .btn-o{background:#ff7a18;color:#fff;} .btn-b{background:#2563eb;color:#fff;}
  /* 작업 목록 */
  .reclist{margin-top:10px;border:1px solid #e5e7eb;border-radius:10px;max-height:230px;overflow:auto;}
  .reclist .it{padding:10px 12px;border-bottom:1px solid #f1f5f9;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;gap:8px;}
  .reclist .it:hover{background:#fff7ed;}
  .reclist .it:last-child{border-bottom:none;}
  .reclist .it .s{font-family:monospace;color:#2563eb;font-size:12px;}
  .reclist .empty{padding:14px;color:#9ca3af;font-size:13px;text-align:center;}
  .orig{margin-top:12px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:11px;padding:12px 14px;display:none;}
  .orig.show{display:block;}
  .orig .t{font-size:12px;font-weight:800;color:#2563eb;margin-bottom:8px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;}
  .kv{font-size:13px;} .kv b{color:#6b7280;font-weight:600;display:block;font-size:11px;}
  .badge{display:inline-block;background:#fee2e2;color:#b91c1c;border-radius:20px;padding:1px 9px;font-size:11px;font-weight:800;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{border:1.5px solid #e5e7eb;border-radius:20px;padding:7px 14px;font-size:13px;cursor:pointer;background:#fff;user-select:none;}
  .chip.on{border-color:#ff7a18;background:#fff7ed;color:#9a3412;font-weight:700;}
  .chip.red.on{border-color:#ef4444;background:#fef2f2;color:#b91c1c;}
  .etc{display:none;margin-top:8px;} .etc.show{display:block;}
  .drop{border:2px dashed #d1d5db;border-radius:12px;padding:20px;text-align:center;color:#6b7280;font-size:13px;background:#fafafa;cursor:pointer;}
  .drop.hover{border-color:#ff7a18;background:#fff7ed;color:#9a3412;}
  .thumbs{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;}
  .thumb{position:relative;width:84px;height:84px;border-radius:9px;overflow:hidden;border:1px solid #e5e7eb;background:#000;}
  .thumb img,.thumb video{width:100%;height:100%;object-fit:cover;}
  .thumb .x{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.6);color:#fff;border-radius:50%;width:20px;height:20px;font-size:13px;line-height:20px;text-align:center;cursor:pointer;}
  .thumb .tag{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:#fff;font-size:10px;text-align:center;}
  .submit{padding:16px 22px;background:#fafafa;border-top:1px solid #e5e7eb;}
  .submit .btn{width:100%;font-size:15px;padding:14px;}
  #status{font-size:13px;margin-top:10px;text-align:center;}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#111827;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;z-index:99;opacity:0;transition:.2s;pointer-events:none;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="head">
      <h1>🔧 오버홀 재수리 요청</h1>
      <p>원래 오버홀한 담당자 선택 → 작업 불러오기 · 등록 시 "오버홀 재수리 요청방" 알림</p>
    </div>

    <!-- 1. 기기/작업 선택 -->
    <div class="sec">
      <h2><span class="n">1</span> 기기 / 작업 선택</h2>
      <div class="row">
        <div>
          <label class="req">작성자 (원 오버홀 담당자)</label>
          <select id="f-person"><option value="">담당자 선택…</option></select>
        </div>
        <div>
          <label>또는 자산번호/시리얼 직접</label>
          <div style="display:flex;gap:6px"><input type="text" id="f-direct" placeholder="자산번호 또는 시리얼"><button class="btn btn-b" id="btn-direct">조회</button></div>
        </div>
      </div>
      <div id="reclist-wrap" style="display:none">
        <label style="margin-top:6px">이 담당자의 오버홀 작업 — 재수리할 기기를 고르세요</label>
        <div class="reclist" id="reclist"></div>
      </div>
      <div class="orig" id="orig">
        <div class="t">✅ 선택된 기기 (재수리 대상)</div>
        <div class="grid">
          <div class="kv"><b>모델</b><span id="o-model">-</span></div>
          <div class="kv"><b>시리얼</b><span id="o-serial">-</span></div>
          <div class="kv"><b>자산번호</b><span id="o-asset">-</span></div>
          <div class="kv"><b>업체</b><span id="o-biz">-</span></div>
          <div class="kv"><b>원 작업일</b><span id="o-date">-</span></div>
          <div class="kv"><b>누적 재수리</b><span id="o-count">0회</span></div>
        </div>
      </div>
    </div>

    <!-- 2. 불량 내용 -->
    <div class="sec">
      <h2><span class="n">2</span> 불량 내용</h2>
      <div class="row">
        <div style="flex:2">
          <label class="req">발견 시점</label>
          <div class="chips" id="when">
            <div class="chip on" onclick="single(this)">출고 전 점검</div>
            <div class="chip" onclick="single(this)">고객 설치 후</div>
            <div class="chip" data-etc="whenEtc" onclick="single(this)">기타</div>
          </div>
          <textarea class="etc" id="whenEtc" placeholder="발견 시점 직접 입력"></textarea>
        </div>
        <div style="flex:1">
          <label class="req">긴급도</label>
          <div class="chips">
            <div class="chip red on" onclick="single(this)">🔴 긴급</div>
            <div class="chip" onclick="single(this)">보통</div>
          </div>
        </div>
      </div>
      <div class="field" style="margin-top:14px">
        <label class="req">불량 부위 <span style="font-weight:400;color:#6b7280">(중복 선택)</span></label>
        <div class="chips" id="part">
          <div class="chip" onclick="multi(this)">급지</div>
          <div class="chip" onclick="multi(this)">화상</div>
          <div class="chip" onclick="multi(this)">정착</div>
          <div class="chip" onclick="multi(this)">보드</div>
          <div class="chip" onclick="multi(this)">외관</div>
          <div class="chip" data-etc="partEtc" onclick="multi(this)">기타</div>
        </div>
        <textarea class="etc" id="partEtc" placeholder="불량 부위 직접 입력"></textarea>
      </div>
      <div class="field">
        <label class="req">증상 상세</label>
        <textarea id="f-symptom" placeholder="예: 출고 점검 중 용지 걸림 반복, 정착부 소음"></textarea>
      </div>
      <div class="field">
        <label>사진 · 동영상 첨부 <span style="font-weight:400;color:#6b7280">(여러 개 · 동영상 1개 40MB 이하)</span></label>
        <div class="drop" id="drop">📎 클릭하거나 파일을 끌어다 놓으세요</div>
        <input type="file" id="file" accept="image/*,video/*" multiple style="display:none">
        <div class="thumbs" id="thumbs"></div>
      </div>
    </div>

    <!-- 3. 요청 정보 -->
    <div class="sec">
      <h2><span class="n">3</span> 요청 정보</h2>
      <div class="row">
        <div>
          <label class="req">재수리 담당자</label>
          <input type="text" id="f-handler" placeholder="기본=원 담당자">
          <p class="muted">재수리는 원래 오버홀한 분이 진행</p>
        </div>
        <div>
          <label class="req">요청일</label>
          <input type="date" id="f-reqdate">
        </div>
      </div>
    </div>

    <div class="submit">
      <button class="btn btn-o" id="btn-submit">재수리 요청 등록 + 채팅방 알림</button>
      <div id="status"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://ilppbxhigxnelbnuxwyt.supabase.co';
const SUPA_KEY = 'sb_publishable_cLR46tr3ITMdCAR7L74ROQ_JEmErvNE';
const APPS_URL = 'https://script.google.com/macros/s/AKfycbwBCwbum3bohh9tlRboZWJo1J1yoAXcOx_PHdmuJcmwMoLG7joTaL4DQIuEp2CP0c0KsQ/exec';
const DRIVE_URL = 'https://script.google.com/macros/s/AKfycbx6KkLobz74ppKwchfnVT0FluqO3HGpNYX5tnBzQRLEQJoUeUd-RTy0pld2YbKm2Q7t3w/exec';
const SUPA_H = { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json' };
function esc(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }

// 오늘 날짜
document.getElementById('f-reqdate').value = new Date().toISOString().slice(0,10);

// 칩
function single(el){ [...el.parentNode.children].forEach(c=>c.classList.remove('on')); el.classList.add('on'); reveal(); }
function multi(el){ el.classList.toggle('on'); reveal(); }
function reveal(){ document.querySelectorAll('.chip[data-etc]').forEach(c=>{ const b=document.getElementById(c.getAttribute('data-etc')); if(b) b.classList.toggle('show', c.classList.contains('on')); }); }

// === 시리얼 목록(listSerials) 로드 ===
let SERIALS = [], REBUILD = [];
async function loadSerials(){
  try {
    const r = await fetch(APPS_URL, { method:'POST', body: JSON.stringify({action:'listSerials'}), redirect:'follow' });
    const j = await r.json();
    SERIALS = (j && j.items) || [];
    const persons = [...new Set(SERIALS.map(x=>x.person).filter(Boolean))].sort();
    const sel = document.getElementById('f-person');
    persons.forEach(p=>{ const o=document.createElement('option'); o.value=p; o.textContent=p; sel.appendChild(o); });
  } catch(e){ console.warn(e); }
}
async function loadRebuild(){
  try {
    const r = await fetch(SUPA_URL+'/rest/v1/app_config?key=eq.rebuild_list&select=value', { headers: SUPA_H });
    const j = await r.json();
    REBUILD = (j && j[0] && Array.isArray(j[0].value)) ? j[0].value : [];
  } catch(e){ REBUILD = []; }
}
loadSerials(); loadRebuild();

// 담당자 선택 → 작업 목록
document.getElementById('f-person').addEventListener('change', e=>{
  const p = e.target.value;
  const wrap = document.getElementById('reclist-wrap'), box = document.getElementById('reclist');
  if(!p){ wrap.style.display='none'; return; }
  document.getElementById('f-handler').value = p;
  const list = SERIALS.filter(x=>x.person===p).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  wrap.style.display='block';
  if(!list.length){ box.innerHTML='<div class="empty">시리얼이 기록된 작업이 없습니다 — 우측에서 직접 조회하세요</div>'; return; }
  box.innerHTML = list.map((x,i)=>'<div class="it" data-i="'+i+'"><span>'+esc(x.date||'')+' · '+esc(x.model||'(모델?)')+'</span><span class="s">'+esc(x.serial||'')+'</span></div>').join('');
  box.querySelectorAll('.it').forEach(el=>{ el.onclick=()=>pickRecord(list[+el.dataset.i]); });
});

async function pickRecord(rec){
  fillOrig({ model:rec.model, serial:rec.serial, date:rec.date, dept:rec.dept });
  // ERP로 자산번호/업체 보강
  if(rec.serial){ const erp = await erpLookup('serial', rec.serial); if(erp){ document.getElementById('o-asset').textContent = erp.asset.asset_no||'-'; document.getElementById('o-biz').textContent = erp.client.business_name||'-'; CUR.asset_no=erp.asset.asset_no||''; CUR.business=erp.client.business_name||''; } }
}
let CUR = {};
function fillOrig(o){
  CUR = { model:o.model||'', serial:o.serial||'', asset_no:CUR.asset_no||'', business:CUR.business||'', origDate:o.date||'', origDept:o.dept||'', origPerson:document.getElementById('f-person').value||'' };
  document.getElementById('o-model').textContent = o.model||'-';
  document.getElementById('o-serial').textContent = o.serial||'-';
  document.getElementById('o-date').textContent = o.date||'-';
  if(o.asset_no!==undefined) document.getElementById('o-asset').textContent = o.asset_no||'-';
  if(o.business!==undefined) document.getElementById('o-biz').textContent = o.business||'-';
  const cnt = REBUILD.filter(x=>x.serial && x.serial===o.serial).length;
  document.getElementById('o-count').innerHTML = cnt>0 ? '<span class="badge">'+cnt+'회</span> (이번이 '+(cnt+1)+'번째)' : '0회 (첫 재수리)';
  document.getElementById('orig').classList.add('show');
}

// 직접 조회 (자산번호 또는 시리얼)
async function erpLookup(param, val){
  try { const r = await fetch('/api/asset?'+param+'='+encodeURIComponent(val)); const j = await r.json(); return (r.ok && !j.error) ? j : null; } catch(e){ return null; }
}
document.getElementById('btn-direct').onclick = async ()=>{
  const v = document.getElementById('f-direct').value.trim(); if(!v) return;
  toast('ERP 조회 중…');
  // 자산번호 우선, 실패 시 시리얼
  let erp = await erpLookup('asset_no', v); if(!erp) erp = await erpLookup('serial', v);
  if(!erp){ toast('ERP에서 못 찾음 — 시리얼로 기록 검색'); const hit=SERIALS.find(x=>x.serial===v); if(hit){ document.getElementById('f-person').value=hit.person; document.getElementById('f-handler').value=hit.person; fillOrig({model:hit.model,serial:hit.serial,date:hit.date,dept:hit.dept}); } else toast('기록에도 없음'); return; }
  CUR.asset_no = erp.asset.asset_no||''; CUR.business = erp.client.business_name||'';
  fillOrig({ model:erp.asset.model, serial:erp.asset.device_sn, asset_no:erp.asset.asset_no, business:erp.client.business_name, date:'', dept:'' });
  // 기록에서 원담당자/원작업일 보강
  const hit = SERIALS.find(x=>x.serial===erp.asset.device_sn);
  if(hit){ document.getElementById('f-person').value=hit.person; document.getElementById('f-handler').value=hit.person; document.getElementById('o-date').textContent=hit.date||'-'; CUR.origDate=hit.date||''; CUR.origDept=hit.dept||''; CUR.origPerson=hit.person||''; }
  toast('불러왔습니다');
};

// 파일 첨부
const drop=document.getElementById('drop'), fi=document.getElementById('file'), thumbs=document.getElementById('thumbs');
let FILES=[];
drop.onclick=()=>fi.click();
fi.onchange=e=>addFiles(e.target.files);
['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('hover');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('hover');}));
drop.addEventListener('drop',e=>addFiles(e.dataTransfer.files));
function addFiles(list){
  for(const f of list){
    if(f.type.startsWith('video') && f.size > 42*1024*1024){ toast('동영상 '+f.name+'은 40MB 초과 — 제외'); continue; }
    const url=URL.createObjectURL(f); const isVid=f.type.startsWith('video'); const idx=FILES.length; FILES.push(f);
    const d=document.createElement('div'); d.className='thumb'; d.dataset.idx=idx;
    d.innerHTML=(isVid?'<video src="'+url+'" muted></video><div class="tag">동영상</div>':'<img src="'+url+'"><div class="tag">사진</div>')+'<div class="x">×</div>';
    d.querySelector('.x').onclick=()=>{ FILES[idx]=null; d.remove(); };
    thumbs.appendChild(d);
  }
}
function readB64(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(file); }); }
async function uploadAll(){
  const out=[]; const files=FILES.filter(Boolean);
  for(let i=0;i<files.length;i++){
    const f=files[i]; document.getElementById('status').textContent='📤 파일 업로드 '+(i+1)+'/'+files.length+'…';
    const b64=await readB64(f);
    const r=await fetch(DRIVE_URL,{method:'POST',body:JSON.stringify({files:[{name:f.name,mimeType:f.type,type:f.type.startsWith('video')?'video':'photo',base64:b64}]}),redirect:'follow'});
    const j=await r.json(); if(j.ok && j.urls && j.urls[0]) out.push(j.urls[0]);
  }
  return out;
}

// 제출
function selChip(id){ const on=document.querySelector('#'+id+' .chip.on'); return on?on.textContent.trim():''; }
function selMulti(id){ return [...document.querySelectorAll('#'+id+' .chip.on')].map(c=>c.textContent.trim()); }
document.getElementById('btn-submit').onclick = async ()=>{
  const serial = document.getElementById('o-serial').textContent.replace('-','').trim();
  const symptom = document.getElementById('f-symptom').value.trim();
  const handler = document.getElementById('f-handler').value.trim();
  if(!serial && !CUR.asset_no){ toast('시리얼 또는 자산번호가 있는 기기를 선택/조회하세요'); return; }
  if(!symptom){ toast('증상을 입력하세요'); return; }
  if(!handler){ toast('재수리 담당자를 입력하세요'); return; }
  let when = selChip('when'); if(when==='기타') when='기타: '+document.getElementById('whenEtc').value.trim();
  let parts = selMulti('part').map(p=> p==='기타' ? ('기타: '+document.getElementById('partEtc').value.trim()) : p);
  const btn=document.getElementById('btn-submit'); btn.disabled=true; btn.textContent='등록 중…';
  try{
    const urls = await uploadAll();
    document.getElementById('status').textContent='💾 저장 중…';
    const rec = {
      id: Date.now(),
      reqDate: document.getElementById('f-reqdate').value,
      asset_no: CUR.asset_no||'', serial: CUR.serial||serial, model: CUR.model||document.getElementById('o-model').textContent,
      business: CUR.business||'', origPerson: CUR.origPerson||document.getElementById('f-person').value||'', origDate: CUR.origDate||'', origDept: CUR.origDept||'',
      handler: handler,
      found: when, parts: parts,
      urgent: (document.querySelector('.chips .chip.red.on')?'긴급':'보통'),
      symptom: symptom, files: urls,
      status: '요청', notified: false, createdAt: new Date().toISOString()
    };
    await loadRebuild(); REBUILD.push(rec);
    // app_config upsert
    const up = await fetch(SUPA_URL+'/rest/v1/app_config?on_conflict=key', {
      method:'POST', headers: { ...SUPA_H, Prefer:'resolution=merge-duplicates' },
      body: JSON.stringify({ key:'rebuild_list', value: REBUILD })
    });
    if(!up.ok) throw new Error('저장 실패('+up.status+')');
    document.getElementById('status').innerHTML='<b style="color:#2f855a">✅ 등록 완료! 요청방으로 알림이 전송됩니다.</b>';
    toast('재수리 요청 등록 완료');
    setTimeout(()=>location.reload(), 1800);
  }catch(e){
    document.getElementById('status').innerHTML='<b style="color:#c53030">❌ '+esc(String(e))+'</b>';
    btn.disabled=false; btn.textContent='재수리 요청 등록 + 채팅방 알림';
  }
};
</script>
